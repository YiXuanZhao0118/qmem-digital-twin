services:
  postgres:
    image: postgres:16
    container_name: qmem_digital_twin_postgres
    environment:
      POSTGRES_DB: qmem_twin
      POSTGRES_USER: qmem
      POSTGRES_PASSWORD: qmem_password
    ports:
      - "5432:5432"
    volumes:
      - qmem_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: qmem_digital_twin_adminer
    ports:
      - "8080:8080"

volumes:
  qmem_pgdata:

